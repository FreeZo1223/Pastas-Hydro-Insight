# Alembic config — Ewaarnemingen PostGIS schema
# Volledige uitleg: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = migrations

# Sjablonen voor nieuwe migration-bestanden — datum + slug = chronologisch ordenbaar
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Tijdzone voor datums in bestandsnamen
timezone = UTC

# sqlalchemy.url wordt RUNTIME ingesteld door env.py op basis van .env
# (zodat credentials niet in dit bestand staan)
sqlalchemy.url = postgresql+psycopg2://INGEVULD_DOOR_ENV_PY/PLACEHOLDER

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
