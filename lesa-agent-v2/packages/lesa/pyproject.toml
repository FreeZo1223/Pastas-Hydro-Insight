[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lesa"
version = "0.1.0"
description = "LESA agentic pipeline — bureauondersteuner, hypothesegenerator, veldwerk-voorbereider"
requires-python = ">=3.11"
dependencies = [
    "geo-stack-nl",
    "pastas-adapter",
    "pydantic>=2.0",
    "python-ulid>=2.0",
    "jinja2>=3.1",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
word = ["python-docx>=1.1"]
qfield = []  # QField .qfp is ZIP + GPKG, geen extra deps
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["lesa"]
