[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# importlib-mode voorkomt module-naam-collisions tussen pakket-tests.
addopts = "--import-mode=importlib"
testpaths = [
    "packages/lesa/tests",
    "packages/lesa_agent/tests",
]
